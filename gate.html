<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Staging Zugang</title>
  <meta name="robots" content="noindex,nofollow,noarchive">
  <meta name="description" content="Geschuetzter Zugang zur Staging-Umgebung.">
  <style>
    :root {
      --bg: #f3f6f4;
      --surface: rgba(255, 255, 255, 0.94);
      --line: rgba(12, 34, 26, 0.12);
      --ink: #10201a;
      --muted: #5f6e68;
      --brand: #1aa36f;
      --brand-deep: #0d7a52;
      --warn: #a13d2d;
      --ok: #0d7a52;
      --shadow: 0 20px 50px rgba(12, 34, 26, 0.12);
      --radius: 24px;
      --radius-sm: 14px;
      --focus: 0 0 0 4px rgba(26, 163, 111, 0.18);
      --font-sans: "Avenir Next", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      --font-display: "Georgia", "Times New Roman", serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      display: grid;
      place-items: center;
      padding: 1rem;
      color: var(--ink);
      font-family: var(--font-sans);
      background:
        radial-gradient(circle at top left, rgba(26, 163, 111, 0.12), transparent 28%),
        linear-gradient(180deg, #f7faf8, var(--bg));
    }

    .card {
      width: min(100%, 560px);
      padding: clamp(1.4rem, 2vw, 2rem);
      border: 1px solid rgba(255, 255, 255, 0.75);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    .mark {
      width: 2.75rem;
      height: 2.75rem;
      display: grid;
      place-items: center;
      margin-bottom: 1rem;
      border-radius: 0.95rem;
      background: linear-gradient(135deg, rgba(26, 163, 111, 0.16), rgba(13, 122, 82, 0.24));
      border: 1px solid rgba(26, 163, 111, 0.14);
    }

    .mark svg {
      width: 1.7rem;
      height: 1.7rem;
    }

    .eyebrow {
      margin: 0 0 0.45rem;
      color: var(--brand-deep);
      font-size: 0.76rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-family: var(--font-display);
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 0.98;
      letter-spacing: -0.04em;
    }

    .lead {
      margin: 0.9rem 0 1.5rem;
      color: var(--muted);
      line-height: 1.6;
    }

    .form {
      display: grid;
      gap: 0.95rem;
    }

    label {
      display: grid;
      gap: 0.45rem;
      font-size: 0.94rem;
      font-weight: 700;
    }

    .field {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      padding: 0.4rem;
      border: 1px solid var(--line);
      border-radius: 1rem;
      background: rgba(255, 255, 255, 0.96);
    }

    .field:focus-within {
      box-shadow: var(--focus);
      border-color: rgba(26, 163, 111, 0.4);
    }

    input {
      width: 100%;
      min-width: 0;
      padding: 0.75rem 0.85rem;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--ink);
      font: inherit;
    }

    input::placeholder {
      color: rgba(95, 110, 104, 0.82);
    }

    button {
      border: 0;
      font: inherit;
      cursor: pointer;
      transition: filter 0.15s ease, transform 0.15s ease;
    }

    button:hover {
      filter: brightness(0.98);
    }

    button:active {
      transform: translateY(1px);
    }

    .toggle {
      flex: 0 0 auto;
      padding: 0.8rem 0.9rem;
      border-radius: 0.85rem;
      background: rgba(16, 32, 26, 0.06);
      color: var(--ink);
      font-weight: 700;
    }

    .submit {
      padding: 0.95rem 1.1rem;
      border-radius: var(--radius-sm);
      background: linear-gradient(135deg, var(--brand), var(--brand-deep));
      color: #fff;
      font-weight: 700;
    }

    .message {
      min-height: 1.1rem;
      margin: 0;
      color: var(--warn);
      font-weight: 700;
    }

    .message.is-ok {
      color: var(--ok);
    }

    .note {
      margin: 0;
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.55;
    }

    @media (max-width: 560px) {
      .field {
        flex-direction: column;
        align-items: stretch;
      }

      .toggle,
      .submit {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="mark" aria-hidden="true">
      <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <rect x="9" y="9" width="46" height="46" rx="14" fill="none" stroke="url(#g)" stroke-width="4"></rect>
        <rect x="19" y="18.5" width="5" height="27" rx="2.2" fill="url(#g)"></rect>
        <path d="M28 19h5.2c8 0 12.8 4.8 12.8 13s-4.8 13-12.8 13H28V19zM32.5 23v18h.5c5.2 0 8.5-3 8.5-9s-3.3-9-8.5-9h-.5z" fill="url(#g)"></path>
        <defs>
          <linearGradient id="g" x1="8" y1="8" x2="56" y2="56" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#1aa36f"></stop>
            <stop offset="1" stop-color="#0d7a52"></stop>
          </linearGradient>
        </defs>
      </svg>
    </div>

    <p class="eyebrow">Staging</p>
    <h1>Geschuetzter Zugang</h1>
    <p class="lead">Bitte Passphrase eingeben.</p>

    <form class="form" id="staging-gate-form" autocomplete="off">
      <label for="staging-passphrase">Passphrase</label>
      <div class="field">
        <input
          id="staging-passphrase"
          name="passphrase"
          type="password"
          inputmode="text"
          placeholder="Passphrase eingeben"
          required
        >
        <button class="toggle" type="button" id="staging-toggle-passphrase">anzeigen</button>
      </div>

      <button class="submit" type="submit">Oeffnen</button>
      <p class="message" id="staging-gate-message" aria-live="polite"></p>
      <p class="note">Leichter Zugangsschutz fuer die Staging-Umgebung.</p>
    </form>
  </main>

  <script src="/gate.js"></script>
</body>
</html>
