<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Weiterleitung | Infektionsdynamiken verstehen</title>
    <meta name="robots" content="noindex,nofollow" />
    <script>
      (function () {
        var target = "/de/guided/";

        try {
          var raw = window.localStorage.getItem("idv.staging.session");
          var ok = false;

          if (raw) {
            var session = JSON.parse(raw);
            ok = !!(session && session.v === "v2" && session.exp > Date.now());
          }

          if (!ok) {
            window.location.replace("/gate.html?next=" + encodeURIComponent(target));
            return;
          }

          window.location.replace(target);
        } catch (error) {
          window.location.replace("/gate.html?next=" + encodeURIComponent(target));
        }
      })();
    </script>
  </head>
  <body>
    <p>Weiterleitung ...</p>
  </body>
</html>
