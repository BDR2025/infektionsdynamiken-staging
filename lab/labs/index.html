<!DOCTYPE html><html lang="de"> <head><meta charset="utf-8"><meta http-equiv="refresh" content="0; url=/de/scientific/labs/"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Weiterleitung zu den Labs</title><link rel="canonical" href="/de/scientific/labs/"><script>
      (() => {
        const params = new URLSearchParams(window.location.search);
        const queryLang = params.get('lang');
        let lang = queryLang === 'en' || queryLang === 'de' ? queryLang : null;

        if (!lang) {
          try {
            const storedLang = window.sessionStorage.getItem('idv-lab-lang');
            if (storedLang === 'en' || storedLang === 'de') lang = storedLang;
          } catch {}
        }

        if (!lang && navigator.language.toLowerCase().startsWith('en')) {
          lang = 'en';
        }

        const resolvedHref = lang === 'en' ? '/en/scientific/labs/' : '/de/scientific/labs/';
        window.location.replace(resolvedHref);
      })();
    </script></head> <body> <p>
Weiterleitung zu <a href="/de/scientific/labs/">/de/scientific/labs/</a> </p> </body></html>
